<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        /* No background – only the window */
        body {
          background: transparent;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          font-family: 'MS Sans Serif', 'Segoe UI', 'Tahoma', sans-serif;
        }
        /* retro window */
        .window {
          width: 580px;
          background: #C0C0C0;
          border-radius: 0;
          box-shadow: 2px 2px 0px 0px #808080, 4px 4px 0px 0px #404040;
          position: relative;
          margin: 20px auto;
        }
        /* title bar */
        .title-bar {
          background: linear-gradient(90deg, #0054E3, #003399);
          padding: 4px 8px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          color: white;
          font-weight: bold;
          font-size: 13px;
        }
        .title-bar .title {
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .title-bar .buttons {
          display: flex;
          gap: 2px;
        }
        .title-bar button {
          background: #C0C0C0;
          border: 1px solid #FFFFFF;
          border-right-color: #808080;
          border-bottom-color: #808080;
          width: 20px;
          height: 20px;
          font-size: 12px;
          font-weight: bold;
          text-align: center;
          line-height: 1;
          cursor: default;
          color: black;
        }
        /* content area */
        .content {
          background: #FFFFF0;
          margin: 8px;
          padding: 12px;
          border: 1px solid #808080;
          box-shadow: inset 1px 1px 0px #FFFFFF, inset -1px -1px 0px #404040;
        }
        /* sections */
        .section {
          margin-bottom: 20px;
        }
        .section-title {
          font-weight: bold;
          font-size: 14px;
          margin-bottom: 8px;
          color: #B13E6F; /* girly pink */
          border-bottom: 1px solid #FFB6D1;
          display: inline-block;
          padding-right: 12px;
        }
        .tech-list {
          list-style: none;
          padding-left: 20px;
        }
        .tech-list li {
          font-family: 'Courier New', monospace;
          font-size: 12px;
          margin-bottom: 4px;
          color: #2c2c2c;
        }
        .tech-list li::before {
          content: "🌸 ";
          color: #FF80B3;
        }
        .message {
          background: #FFF0F5;
          padding: 10px;
          border: 1px solid #FFB6D1;
          border-radius: 4px;
          text-align: center;
          font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
          color: #B02B5E;
          margin-top: 12px;
        }
        /* status bar */
        .status-bar {
          background: #C0C0C0;
          padding: 4px 8px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 11px;
          border-top: 1px solid #FFFFFF;
          color: #000000;
        }
        .status-bar .ok-button {
          background: #C0C0C0;
          border: 1px solid #FFFFFF;
          border-right-color: #808080;
          border-bottom-color: #808080;
          padding: 2px 12px;
          font-size: 11px;
          font-weight: bold;
          cursor: default;
        }
        .footer-icon {
          font-size: 12px;
        }
      </style>
      <div class="window">
        <div class="title-bar">
          <div class="title">
            <span>🌸 Pink Tech Stack (Retro Paint Edition) 🌸</span>
          </div>
          <div class="buttons">
            <button>_</button>
            <button>✕</button>
          </div>
        </div>
        <div class="content">
          <div class="section">
            <div class="section-title">💾 LANGUAGES</div>
            <ul class="tech-list">
              <li>JavaScript</li>
              <li>Python</li>
              <li>TypeScript</li>
              <li>HTML/CSS</li>
            </ul>
          </div>
          <div class="section">
            <div class="section-title">⚙️ FRAMEWORKS</div>
            <ul class="tech-list">
              <li>React & Next.js</li>
              <li>Vue / Nuxt</li>
              <li>Tailwind CSS</li>
              <li>Express / FastAPI</li>
            </ul>
          </div>
          <div class="section">
            <div class="section-title">💌 LITTLE MESSAGE</div>
            <div class="message">
              ✨ retro pixel vibes, still girly at heart ✨<br/>
              💖 click OK to continue coding 💖
            </div>
          </div>
        </div>
        <div class="status-bar">
          <span>📟 Paint.exe | Ready | y2k.exe loaded</span>
          <div class="footer-icon">💗</div>
          <div class="ok-button">OK</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
